<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOCUSLOOM Chatbot Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .arrow {
      position: fixed;
      bottom: 100px;
      right: 100px;
      font-size: 60px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    /* Chatbot Button */
    .chat-button {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border: none;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: all 0.3s;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-button:hover {
      transform: scale(1.1);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    }

    .chat-button.open {
      background: #ef4444;
    }

    /* Chat Window */
    .chat-window {
      position: fixed;
      bottom: 100px;
      right: 24px;
      width: 400px;
      height: 600px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: none;
      flex-direction: column;
      z-index: 999;
    }

    .chat-window.open {
      display: flex;
    }

    .chat-header {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      padding: 20px;
      border-radius: 20px 20px 0 0;
    }

    .chat-header h3 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .chat-header p {
      font-size: 12px;
      opacity: 0.9;
      margin: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f9fafb;
    }

    .message {
      margin-bottom: 15px;
      display: flex;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.assistant .message-content {
      background: #e5e7eb;
      color: #1f2937;
    }

    .message.user .message-content {
      background: #3b82f6;
      color: white;
    }

    .chat-input {
      padding: 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      background: white;
      border-radius: 0 0 20px 20px;
    }

    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
    }

    .chat-input input:focus {
      border-color: #3b82f6;
    }

    .chat-input button {
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.3s;
    }

    .chat-input button:hover {
      background: #2563eb;
    }

    .quick-questions {
      padding: 0 20px 15px;
      background: #f9fafb;
    }

    .quick-questions p {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .quick-btn {
      display: inline-block;
      padding: 6px 12px;
      background: white;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 15px;
      font-size: 11px;
      margin: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎓 FOCUSLOOM Chatbot</h1>
    <p>Click the 💬 button in the bottom-right corner!</p>
    <div class="arrow">👇</div>
  </div>

  <!-- Chat Button -->
  <button class="chat-button" id="chatButton" onclick="toggleChat()">
    💬
  </button>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow">
    <div class="chat-header">
      <h3>🎓 Study Assistant</h3>
      <p>Ask educational questions without leaving!</p>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message assistant">
        <div class="message-content">
          👋 Hi! I'm your study assistant. Ask me any educational questions!
        </div>
      </div>
    </div>

    <div class="quick-questions">
      <p>Quick questions:</p>
      <button class="quick-btn" onclick="askQuestion('How to solve quadratic equations?')">How to solve quadratic equations?</button>
      <button class="quick-btn" onclick="askQuestion('Explain derivatives in calculus')">Explain derivatives</button>
      <button class="quick-btn" onclick="askQuestion('Python for loop syntax')">Python loops</button>
    </div>

    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="Ask your educational question..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()">📤</button>
    </div>
  </div>

  <script>
    function toggleChat() {
      const chatWindow = document.getElementById('chatWindow');
      const chatButton = document.getElementById('chatButton');
      
      chatWindow.classList.toggle('open');
      chatButton.classList.toggle('open');
      chatButton.textContent = chatWindow.classList.contains('open') ? '✕' : '💬';
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    function askQuestion(question) {
      document.getElementById('messageInput').value = question;
      sendMessage();
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message) return;

      // Add user message
      addMessage(message, 'user');
      input.value = '';

      // Simulate AI response
      setTimeout(() => {
        const response = getEducationalResponse(message);
        addMessage(response, 'assistant');
      }, 500);
    }

    function addMessage(text, role) {
      const messagesDiv = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = text;
      
      messageDiv.appendChild(contentDiv);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function getEducationalResponse(question) {
      const q = question.toLowerCase();

      if (q.includes('calculus') || q.includes('derivative')) {
        return '📐 Calculus Help:\n\n1. Derivative basics: d/dx(x^n) = nx^(n-1)\n2. Chain rule: d/dx[f(g(x))] = f\'(g(x)) × g\'(x)\n3. Product rule: d/dx[f(x)g(x)] = f\'(x)g(x) + f(x)g\'(x)\n\nNeed help with a specific problem?';
      }

      if (q.includes('quadratic') || q.includes('equation')) {
        return '🔢 Quadratic Equations:\n\nFormula: x = (-b ± √(b² - 4ac)) / 2a\n\nFor ax² + bx + c = 0\n\nExample: x² - 5x + 6 = 0\nx = 3 or x = 2';
      }

      if (q.includes('python') || q.includes('loop')) {
        return '💻 Python Loops:\n\nfor i in range(5):\n    print(i)\n\nwhile count < 5:\n    print(count)\n    count += 1\n\nWhat specific loop problem are you working on?';
      }

      if (q.includes('physics') || q.includes('newton')) {
        return '⚛️ Newton\'s Laws:\n\n1st Law: Objects stay at rest or in motion\n2nd Law: F = ma\n3rd Law: Action = Reaction\n\nAsk about a specific law!';
      }

      return '🤔 I can help with:\n\n• Math (Calculus, Algebra)\n• Science (Physics, Chemistry)\n• Programming (Python, JavaScript)\n• Study techniques\n\nWhat would you like to learn?';
    }
  </script>
</body>
</html>
